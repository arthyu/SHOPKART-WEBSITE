{% extends "base.html" %}
{% block title %}Register — ShopKart{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">🛒</div>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Join ShopKart and start shopping</p>
    <form method="post">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="John Doe" class="form-input"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com" class="form-input"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-eye-wrap">
          <input type="password" name="password" id="pw" required placeholder="Min 6 characters" class="form-input"/>
          <button type="button" class="eye-btn" onclick="togglePw('pw',this)"><i class="fa fa-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
