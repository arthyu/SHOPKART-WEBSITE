{% extends "base.html" %}
{% block title %}Verify OTP — ShopKart{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">✉️</div>
    <h1 class="auth-title">Check your email</h1>
    <p class="auth-sub">We sent a 6-digit OTP to <strong>{{ email }}</strong></p>
    <form method="post">
      <div class="form-group">
        <label>Enter OTP</label>
        <input type="text" name="otp" required placeholder="123456" class="form-input otp-input"
               maxlength="6" autocomplete="one-time-code" inputmode="numeric"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Verify & Continue</button>
    </form>
    <p class="auth-switch">Wrong email? <a href="{{ url_for('register') }}">Go back</a></p>
  </div>
</div>
{% endblock %}
