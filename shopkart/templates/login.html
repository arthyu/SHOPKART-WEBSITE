{% extends "base.html" %}
{% block title %}Login — ShopKart{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">🛒</div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your ShopKart account</p>
    <form method="post">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com" class="form-input"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-eye-wrap">
          <input type="password" name="password" id="pw" required placeholder="••••••••" class="form-input"/>
          <button type="button" class="eye-btn" onclick="togglePw('pw',this)"><i class="fa fa-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Sign In</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Sign up</a></p>
  </div>
</div>
{% endblock %}
